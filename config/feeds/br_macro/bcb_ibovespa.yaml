feed_id: bcb_ibovespa
name: "IBOVESPA Index (Yahoo Finance)"
version: "2.0.0"
status: active

source:
  type: api
  url: "https://query2.finance.yahoo.com/v8/finance/chart/%5EBVSP?range=1mo&interval=1d"
  format: yahoo_chart
  auth_method: none
  rate_limit_rpm: 10
  backfill_url: "https://query2.finance.yahoo.com/v8/finance/chart/%5EBVSP?period1=0&period2=9999999999&interval=1d"

schedule:
  cron: "0 6 * * 1-5"
  timezone: "America/Sao_Paulo"
  retry_attempts: 3
  retry_delay_seconds: 60

schema_fields:
  - name: data
    source_field: data
    type: string
    required: true
    description: "Date in dd/mm/yyyy format"
    silver_type: DATE
    silver_expression: "strptime(\"{col}\", '%d/%m/%Y')"
  - name: valor
    source_field: valor
    type: string
    required: true
    description: "IBOVESPA index closing value"
    silver_type: DOUBLE
    silver_expression: "CAST(\"{col}\" AS DOUBLE)"

processing:
  bronze:
    write_mode: append
    rescued_data_column: "_rescued_data"
  silver:
    processing_type: latest_only
    primary_key:
      - series
      - date
    dedup_columns:
      - date
    dedup_order_by: "_ingested_at DESC"

quality:
  bronze:
    max_null_rate: 0.02
    min_row_count: 1
    max_rescued_data_rate: 0.10
  gold:
    max_null_rate: 0.02
    min_row_count: 1
    value_range_min: 0.0
    value_range_max: 500000.0
    critical_checks:
      - value_range
      - typical_range
metadata:
  unit: "Points"
  tags:
    - ibovespa
    - equity
    - stock_market
    - bolsa
    - yahoo_finance
  domain: equity
