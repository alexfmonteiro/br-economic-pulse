feed_id: derived_yield_spread
name: "Yield Curve Spread (Long - Short Prefixado)"
status: active
version: "1.0.0"
bronze_source: computed

processing:
  bronze:
    write_mode: append
  silver:
    processing_type: latest_only
    dedup_columns: [date]
    dedup_order_by: "_ingested_at DESC"

quality:
  bronze:
    max_null_rate: 1.0
    min_row_count: 0
  gold:
    max_null_rate: 0.05
    min_row_count: 10
    value_range_min: -10.0
    value_range_max: 15.0

metadata:
  unit: "p.p."
  tags: [yield_spread, yield_curve, prefixado, fixed_income, derived]
  domain: fixed_income
